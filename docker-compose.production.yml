services:
  openclaw-gateway:
    image: node:20-alpine
    container_name: fbr-click-openclaw
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    command: ["node", "server.js"]
    volumes:
      - ./openclaw:/app:ro
    ports:
      - "127.0.0.1:3500:3500"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3500/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fbr-click-fastapi
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fbr-click-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SESSION_SECRET: ${SESSION_SECRET}
      APP_ENV: ${APP_ENV}
      BACKEND_URL: http://fastapi:8000
      DASHBOARD_EMAIL: ${DASHBOARD_EMAIL}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DASHBOARD_USER_ID: ${DASHBOARD_USER_ID}
      DASHBOARD_WORKSPACE_ID: ${DASHBOARD_WORKSPACE_ID}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: fbr-click-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      fastapi:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fbr-click-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://click.fbrapps.com/grafana/
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: fbr-click-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      fastapi:
        condition: service_healthy
      grafana:
        condition: service_started
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  grafana_data:
