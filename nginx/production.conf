server {
    listen 80;
    server_name click.fbrapps.com api.click.fbrapps.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name click.fbrapps.com;

    ssl_certificate /etc/letsencrypt/live/click.fbrapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/click.fbrapps.com/privkey.pem;

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name api.click.fbrapps.com;

    ssl_certificate /etc/letsencrypt/live/click.fbrapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/click.fbrapps.com/privkey.pem;

    location /health {
        proxy_pass http://fastapi:8000/health;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://fastapi:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
